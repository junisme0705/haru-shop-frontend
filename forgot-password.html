<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Haru</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="homepage">

    <video autoplay muted loop id="bg-video">
        <source src="../IMG/ClipBackground.mp4" type="video/mp4">
        Trình duyệt của bạn không hỗ trợ video.
    </video>

    <audio loop id="bg-music" autoplay>
        <source src="../SOUNDS/music.mp3" type="audio/mpeg">
    </audio>

    <div class="login-container">
        <div class="login-box glass-effect">

            <div class="login-logo">Haru</div>

            <h1>Khôi phục mật khẩu</h1>
            <p class="register-prompt">Nhớ mật khẩu? <a href="Login.HTML" class="register-link">Đăng nhập tại đây</a>
            </p>

            <!-- FORM 1: NHẬP EMAIL ĐỂ NHẬN OTP -->
            <form action="#" method="POST" class="login-form" id="step1-forgot-form" novalidate>
                <div class="input-group">
                    <input type="email" id="forgot-email" class="input-field" placeholder=" " required>
                    <label for="forgot-email" class="input-label">Email đã đăng ký</label>
                </div>

                <p id="step1-error"
                    style="color: #ffcccc; font-size: 13px; display: none; margin-bottom: 15px; text-align: center;">
                </p>

                <button type="submit" class="btn btn-primary" id="btn-send-otp">Gửi mã OTP</button>
            </form>

            <!-- FORM 2: NHẬP OTP VÀ MẬT KHẨU MỚI (Mặc định ẩn) -->
            <form action="#" method="POST" class="login-form" id="step2-reset-form" style="display: none;" novalidate>
                <p style="color: #a7f3d0; font-size: 13px; margin-bottom: 20px; text-align: center;">
                    <i class="fas fa-check-circle"></i> Mã OTP đã được gửi đến Email của bạn!
                </p>

                <div class="input-group">
                    <input type="text" id="reset-otp" class="input-field" placeholder=" " maxlength="6"
                        style="letter-spacing: 5px; font-weight: bold;" required>
                    <label for="reset-otp" class="input-label">Mã OTP (6 số)</label>
                </div>

                <div class="input-group">
                    <input type="password" id="reset-new-password" class="input-field" placeholder=" " required>
                    <label for="reset-new-password" class="input-label">Mật khẩu mới</label>
                </div>

                <p id="step2-error"
                    style="color: #ffcccc; font-size: 13px; display: none; margin-bottom: 15px; text-align: center;">
                </p>

                <button type="submit" class="btn btn-primary" id="btn-reset-pass">Xác nhận đổi mật khẩu</button>
            </form>
        </div>
    </div>

    <footer class="page-footer">
        <a href="#">Chính sách quyền riêng tư</a>
        <a href="#">Điều khoản dịch vụ</a>
    </footer>

    <script src="js/header.js"></script>
    <script src="js/login-register.js"></script>
    <script src="js/forgot-password.js"></script>
</body>
</body>

</html>
