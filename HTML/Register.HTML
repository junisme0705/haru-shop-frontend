<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Haru</title>

    <link rel="stylesheet" href="../CSS/style.CSS">
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="homepage">

    <video autoplay muted loop id="bg-video">
        <source src="../IMG/ClipBackground.mp4" type="video/mp4">
    </video>

    <audio loop id="bg-music" autoplay>
        <source src="../SOUNDS/music.mp3" type="audio/mpeg">
    </audio>

    <div class="login-container">
        <div class="login-box glass-effect">

            <div class="login-logo">Haru</div>

            <h1>Tạo tài khoản</h1>
            <p class="register-prompt">Đã có tài khoản? <a href="Login.HTML" class="register-link">Đăng nhập ngay</a>
            </p>

            <form action="#" method="POST" class="login-form" id="register-form" novalidate>

                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder=" " required>
                    <label for="email" class="input-label">Email</label>
                </div>

                <div class="input-group">
                    <input type="text" id="username" class="input-field" placeholder=" " required>
                    <label for="username" class="input-label">Tên người dùng</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder=" " required>
                    <label for="password" class="input-label">Mật khẩu</label>
                </div>

                <div class="input-group">
                    <input type="password" id="confirm-password" class="input-field" placeholder=" " required>
                    <label for="confirm-password" class="input-label">Xác nhận mật khẩu</label>
                </div>

                <button type="submit" class="btn btn-primary" id="register-button" disabled>Đăng ký</button>
            </form>
        </div>
    </div>

    <footer class="page-footer">
        <a href="#">Chính sách quyền riêng tư</a>
        <a href="#">Điều khoản dịch vụ</a>
    </footer>

    <script src="../JS/Header.JS"></script>
    <script src="../JS/LoginRegister.JS"></script>
</body>
</body>

</html>
