<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Haru</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="homepage">

    <video autoplay muted loop id="bg-video">
        <source src="../IMG/ClipBackground.mp4" type="video/mp4">
        Trình duyệt của bạn không hỗ trợ video.
    </video>

    <audio loop id="bg-music" autoplay>
        <source src="../SOUNDS/music.mp3" type="audio/mpeg">
    </audio>

    <div class="login-container">
        <div class="login-box glass-effect">

            <div class="login-logo">Haru</div>

            <h1>Đăng nhập</h1>
            <p class="register-prompt">Bạn chưa có tài khoản? <a href="register.html" class="register-link">Đăng ký tại
                    đây</a></p>

            <form action="#" method="POST" class="login-form" id="login-form" novalidate>
                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder=" " required>
                    <label for="email" class="input-label">Email</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder=" " required>
                    <label for="password" class="input-label">Mật khẩu</label>
                    <a href="forgot-password.html" class="forgot-password-link">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn btn-primary" id="login-button" disabled>Đăng nhập</button>
                <div class="separator"><span>hoặc tiếp tục với</span></div>

                <div class="social-icons-login">
                    <button type="button" id="google-login-btn" class="social-btn google" title="Đăng nhập bằng Google">
                        <i class="fab fa-google"></i>
                    </button>
                    <button type="button" id="facebook-login-btn" class="social-btn facebook"
                        title="Đăng nhập bằng Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <footer class="page-footer">
        <a href="#">Chính sách quyền riêng tư</a>
        <a href="#">Điều khoản dịch vụ</a>
    </footer>

    <script src="js/header.js"></script>
    <script src="js/login-register.js"></script>
</body>
</body>

</html>
